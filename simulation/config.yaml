# Variables and coefficients
alpha: 20
b: -0.33333
phi0: 0.4
phif: -0.6
phi_var: 0.004
D: 1
q0: 1

# Simulation parameters
dt: 0.001
nsteps: 2500
drain: False
drain_start: 0
drain_stop: 1000

# dimension: 2 for 2D periodic grid, 3 for spherical surface
dim: 2

# 2D Grid inputs:
nx: 200
ny: 200
dx: 0.784
dy: 0.784

# 3D grid inputs
nside: 12 # number of pixels on sphere = 12*(nside**2)

# outputs
log_file: "pfc.log"
trajectory_file: "pfc.h5"
trajectory_write_interval: 5 # in number of steps
