# Variables and coefficients
alpha: 20
b: -0.33333
phi0: 0.4
phif: -0.6
phi_var: 0.004
D: 1
q0: 1

# Simulation parameters
dt: 0.001
nsteps: 250000
drain: True
drain_start: 0
drain_stop: 1000

# dimension: 2 for 2D grid, 3 for Gmsh2DIn3DSpace
dim: 2

# 2D Grid inputs:
nx: 200
ny: 200
dx: 0.784
dy: 0.784

# 3D input files
mesh_file: "mesh.geo" # contains inputs for Gmsh2DIn3DSpace

# outputs
log_file: "pfc.log"
trajectory_file: "pfc.h5"
trajectory_write_interval: 5000 # in number of steps
